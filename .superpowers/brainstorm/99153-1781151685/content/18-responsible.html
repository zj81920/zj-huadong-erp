<h2>责任人 — 保持行内直接选择</h2>
<p class="subtitle">不动弹窗，不改交互，保持高效</p>

<div class="section">
  <h3>责任人列：点击直接选人</h3>
  <div class="mockup">
    <div class="mockup-body" style="padding:12px;font-size:13px">
      <table style="width:100%;border-collapse:collapse">
        <tr style="background:#f8f9fa">
          <th style="padding:8px;text-align:left;border-bottom:2px solid #ddd">节点名称</th>
          <th style="padding:8px;text-align:left;border-bottom:2px solid #ddd;width:120px">责任人</th>
        </tr>
        <tr>
          <td style="padding:8px;border-bottom:1px solid #eee">工艺流程图(PFD)绘制</td>
          <td style="padding:8px;border-bottom:1px solid #eee">
            <span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:12px">张工 ▼</span>
          </td>
        </tr>
        <tr>
          <td style="padding:8px;border-bottom:1px solid #eee">管道仪表流程图(PID)绘制</td>
          <td style="padding:8px;border-bottom:1px solid #eee">
            <span style="color:#999;cursor:pointer;font-size:12px">+ 指定责任人</span>
          </td>
        </tr>
      </table>
      <p style="margin-top:8px;font-size:12px;color:#888">点击展开下拉选择人员，即时保存。L4 和 L3(采购) 可选责任人。</p>
    </div>
  </div>
</div>

<div class="section">
  <h3>哪些层级需要责任人？</h3>
  <div class="options">
    <div class="option" data-choice="resp-a" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>仅 L4 任务</h3>
        <p>只有具体任务才需要指定执行人</p>
      </div>
    </div>
    <div class="option" data-choice="resp-b" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>L4 + L3(采购类)</h3>
        <p>和现状一样，任务 + 采购专业节点可指定责任人</p>
      </div>
    </div>
    <div class="option" data-choice="resp-c" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>L3 和 L4 都可指定</h3>
        <p>专业负责人也可以指定，方便追踪各专业谁在负责</p>
      </div>
    </div>
  </div>
</div>
